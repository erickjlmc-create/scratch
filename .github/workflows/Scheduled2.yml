name: Scheduled2

on:
  schedule:
    # Cada 15 min, 24/7 — mismo ritmo que el bot Trifecta
    - cron: '*/15 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: Scheduled-run-2
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install -r requirements.txt

      - run: python Scratch2.py
        env:
          # Secrets exclusivos del grupo RVOL — distintos al bot Trifecta
          SCRATCH_TOKEN:   ${{ secrets.RVOL_BOT_TOKEN }}
          SCRATCH_CHAT_ID:     ${{ secrets.RVOL_CHAT_ID }}
          NTFY_TOPIC:  ${{ secrets.RVOL_NTFY_TOPIC }}

      - name: Save State
        run: |
          git config user.name "Scratch2"
          git config user.email "bot@users.noreply.github.com"
          git add state2.json
          if git diff --staged --quiet; then
            echo "Sin cambios en state2.json"
            exit 0
          fi
          git commit -m "update state"
          git pull --rebase --autostash origin main
          git push

          git commit -m "Actualiza estado RVOL [skip ci]"
          git pull --rebase --autostash origin main
          git push
