name: Trifecta Pro Bot

on:
  schedule:
    # Cada 15 min, 24/7, todos los dias (Respaldo nativo)
    - cron: '*/15 * * * *'
  workflow_dispatch: {}   # Permite que cron-job.org dispare el bot de forma externa y privada

permissions:
  contents: write   # Necesario para que el bot pueda guardar y hacer commit de state.json

concurrency:
  group: trifecta-bot-scan
  cancel-in-progress: false   # Evita que se crucen ejecuciones y se corrompa el archivo state.json

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar entorno de Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar Escáner de Trading
        run: python trifecta_bot.py
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          # Estas líneas jalan tus IDs ocultos de forma 100% segura y privada:
          TELEGRAM_CANAL_PRINCIPAL_ID: ${{ secrets.TELEGRAM_CANAL_PRINCIPAL_ID }}
          TELEGRAM_CANAL_RADAR_ID: ${{ secrets.TELEGRAM_CANAL_RADAR_ID }}

      - name: Guardar estado y gestionar Breakevens en la nube
        run: |
          git config user.name "trifecta-bot"
          git config user.email "bot@users.noreply.github.com"
          git add state.json
          if git diff --staged --quiet; then
            echo "Sin cambios en state.json (No hay operaciones nuevas ni ajustes de Breakeven)"
            exit 0
          fi
          git commit -m "Actualiza estado de operaciones [skip ci]"
          git pull --rebase --autostash origin main
          git push
